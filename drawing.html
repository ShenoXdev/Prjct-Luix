<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Luix's Endless Drawing</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; overflow: hidden; touch-action: none; font-family: sans-serif; background: #fff; }

    #topBar {
      position: fixed; top: 0; right: 0; left: 0; background: #f0f0f0;
      padding: 0 10px; display: flex; justify-content: space-between; align-items: center;
      z-index: 10; height: 44px; border-bottom: 1px solid #ccc;
    }
    .control-group { display: flex; align-items: center; gap: 8px; }
    .control-group label { font-size: 14px; white-space: nowrap; }
    #colorPicker { width: 30px; height: 30px; padding: 2px; border: 1px solid #ccc; border-radius: 4px; cursor: pointer; }
    #brushSize   { width: 42px; padding: 4px; border: 1px solid #ccc; border-radius: 4px; text-align: center; }

    #bottomBar {
      position: fixed; bottom: 0; right: 0; left: 0; background: #f0f0f0;
      padding: 0 10px; display: flex; justify-content: space-around; align-items: center;
      z-index: 10; height: 52px; border-top: 1px solid #ccc;
    }
    .tool-button {
      background: white; border: 1px solid #ccc; border-radius: 8px;
      padding: 6px 10px; font-size: 16px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      min-width: 44px; height: 38px; transition: background .15s;
    }
    .tool-button:hover { background: #e8e8e8; }

    /* WebGL canvas يغطي المنطقة بين الشريطين */
    #glCanvas {
      position: absolute; top: 44px; left: 0;
      width: 100%; height: calc(100% - 96px);
      touch-action: none; display: block;
    }
    /* Canvas 2D فوقه للرسم اللحظي فقط */
    #drawCanvas {
      position: absolute; top: 44px; left: 0;
      width: 100%; height: calc(100% - 96px);
      touch-action: none; pointer-events: none;
    }
    /* الـ canvas الفعلي لالتقاط الأحداث */
    #eventCanvas {
      position: absolute; top: 44px; left: 0;
      width: 100%; height: calc(100% - 96px);
      touch-action: none; background: transparent;
    }

    .zoom-info {
      position: fixed; bottom: 57px; left: 10px;
      background: rgba(0,0,0,0.45); color: white;
      padding: 4px 9px; border-radius: 5px; font-size: 12px; z-index: 15;
    }

    /* Tools menu */
    #toolsMenu {
      position: fixed; bottom: 60px; right: 10px; background: white; border-radius: 14px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.18); z-index: 30; display: none;
      flex-direction: column; min-width: 200px; overflow: hidden;
    }
    .menu-section-title { font-size: 11px; color: #888; padding: 10px 14px 4px; letter-spacing: .5px; }
    #quickColors { display: flex; flex-wrap: wrap; gap: 7px; padding: 6px 14px 10px; }
    .qcolor { width: 26px; height: 26px; border-radius: 50%; border: 2px solid transparent; cursor: pointer; transition: transform .1s; }
    .qcolor:hover { transform: scale(1.15); }
    .qcolor.selected { border-color: #333; }
    .menu-divider { height: 1px; background: #eee; margin: 2px 0; }
    .draw-tool-btn {
      display: flex; align-items: center; gap: 10px;
      border: none; background: none; padding: 11px 14px;
      font-size: 14px; cursor: pointer; border-bottom: 1px solid #f0f0f0;
    }
    .draw-tool-btn:hover { background: #f5f5f5; }
    .draw-tool-btn.active { background: #e8f2ff; }
    .draw-tool-btn .tool-icon { font-size: 20px; width: 28px; text-align: center; }
    .draw-tool-btn .tool-label { flex: 1; }
    .draw-tool-btn .tool-check { color: #4a9eff; font-size: 16px; opacity: 0; }
    .draw-tool-btn.active .tool-check { opacity: 1; }

    /* Dropdown */
    #dropdownMenu {
      position: fixed; bottom: 60px; left: 10px; background: white; border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.18); z-index: 30; display: none;
      flex-direction: column; min-width: 180px; overflow: hidden;
    }
    #dropdownMenu > button {
      border: none; background: none; padding: 13px 14px; text-align: right;
      font-size: 14px; border-bottom: 1px solid #eee; cursor: pointer;
    }
    #dropdownMenu > button:hover { background: #f5f5f5; }
    #roomControls { display: flex; flex-direction: column; gap: 7px; padding: 10px 14px; }
    .room-status  { display: flex; align-items: center; gap: 6px; font-size: 13px; }
    .status-indicator { width: 10px; height: 10px; border-radius: 50%; background: #f44336; flex-shrink: 0; }
    .status-connected { background: #4CAF50 !important; }
    #roomCodeInput { padding: 6px 8px; border: 1px solid #ccc; border-radius: 6px; font-size: 13px; width: 100%; }
    .room-btn { padding: 8px; border: 1px solid #ccc; border-radius: 6px; background: white; cursor: pointer; font-size: 13px; text-align: center; }
    .room-btn:hover { background: #f5f5f5; }

    input[type="file"] { display: none; }
    .sync-notification {
      position: fixed; bottom: 104px; left: 10px; background: rgba(0,0,0,0.7);
      color: white; padding: 8px 13px; border-radius: 6px; font-size: 12px;
      opacity: 0; transition: opacity .3s; pointer-events: none; z-index: 40;
    }
    .sync-notification.show { opacity: 1; }
  </style>
</head>
<body>

<div id="topBar">
  <div class="control-group">
    <label for="colorPicker">🎨</label>
    <input type="color" id="colorPicker" value="#000000">
  </div>
  <div class="control-group">
    <label for="brushSize">الحجم:</label>
    <input type="number" id="brushSize" min="1" max="100" value="3">
  </div>
  <button id="menuToggle" class="tool-button" style="border:none;background:none;font-size:20px;">⋯</button>
</div>

<div id="bottomBar">
  <button id="undoBtn"  class="tool-button">↩️</button>
  <button id="redoBtn"  class="tool-button">↪️</button>
  <button id="clearBtn" class="tool-button">🧹</button>
  <button id="saveBtn"  class="tool-button">💾</button>
  <button id="paletteBtn" class="tool-button">
    <svg viewBox="0 0 100 100" width="28" height="28" xmlns="http://www.w3.org/2000/svg">
      <ellipse cx="46" cy="54" rx="38" ry="34" fill="#7a5c4e" stroke="#4a3328" stroke-width="3"/>
      <ellipse cx="62" cy="34" rx="9" ry="10" fill="white"/>
      <circle cx="30" cy="42" r="7" fill="#b07fd0"/>
      <circle cx="26" cy="58" r="7" fill="#7ab8e8"/>
      <circle cx="35" cy="70" r="7" fill="#7dcf8a"/>
      <circle cx="51" cy="74" r="7" fill="#f0e06a"/>
      <circle cx="46" cy="40" r="6" fill="#f07a6a"/>
      <rect x="68" y="28" width="6" height="28" rx="3" fill="#c8a46a" transform="rotate(20,71,42)"/>
      <ellipse cx="80" cy="26" rx="5" ry="9" fill="#8b5e3c" transform="rotate(20,80,30)"/>
    </svg>
  </button>
</div>

<!-- WebGL layer (committed strokes) -->
<canvas id="glCanvas"></canvas>
<!-- 2D layer (live stroke while drawing) -->
<canvas id="drawCanvas"></canvas>
<!-- Event capture layer -->
<canvas id="eventCanvas"></canvas>

<div class="zoom-info" id="zoomInfo">زوم: 1x</div>
<div class="sync-notification" id="syncNotification"></div>
<input type="file" id="jsonFileInput" accept=".json">

<!-- Tools menu -->
<div id="toolsMenu">
  <div class="menu-section-title">الألوان السريعة</div>
  <div id="quickColors"></div>
  <div class="menu-divider"></div>
  <div class="menu-section-title">أدوات الرسم</div>
  <div id="drawToolsList">
    <button class="draw-tool-btn active" data-tool="brush">
      <span class="tool-icon">🖌️</span>
      <span class="tool-label">فرشاة عادية</span>
      <span class="tool-check">✓</span>
    </button>
    <button class="draw-tool-btn" data-tool="pencil">
      <span class="tool-icon">
        <svg viewBox="0 0 24 24" width="22" height="22" xmlns="http://www.w3.org/2000/svg">
          <polygon points="3,17 2,22 7,21" fill="#555"/>
          <rect x="4.5" y="4" width="5" height="14" rx="1" transform="rotate(-45 7 11)" fill="#f5c842" stroke="#c8a000" stroke-width=".8"/>
          <rect x="4.5" y="4" width="5" height="4" rx="1" transform="rotate(-45 7 11)" fill="#e8a87c" stroke="#c87040" stroke-width=".8"/>
        </svg>
      </span>
      <span class="tool-label">قلم رصاص</span>
      <span class="tool-check">✓</span>
    </button>
  </div>
</div>

<!-- Dropdown -->
<div id="dropdownMenu">
  <button id="saveJsonBtn">💾 حفظ JSON</button>
  <button id="loadJsonBtn">📂 فتح JSON</button>
  <div id="roomControls">
    <div class="room-status">
      <span class="status-indicator" id="connectionStatus"></span>
      <span>الحالة</span>
    </div>
    <input type="text" id="roomCodeInput" placeholder="كود الغرفة">
    <button id="newRoomBtn"   class="room-btn">➕ غرفة جديدة</button>
    <button id="joinRoomBtn"  class="room-btn">🔗 انضمام</button>
    <button id="leaveRoomBtn" class="room-btn" style="display:none;">👋 مغادرة</button>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
<script>
/* ══════════════════════════════════════════
   Firebase
══════════════════════════════════════════ */
const firebaseConfig = {
  apiKey: "AIzaSyC6PieefR4_qJwC6NXdJNN16GNyBu7UQOw",
  authDomain: "endless-drawing.firebaseapp.com",
  databaseURL: "https://endless-drawing-default-rtdb.firebaseio.com",
  projectId: "endless-drawing",
  storageBucket: "endless-drawing.firebasestorage.app",
  messagingSenderId: "193053808478",
  appId: "1:193053808478:web:fd0c700ca0a94f584fe1cf"
};
firebase.initializeApp(firebaseConfig);
const db       = firebase.database();
const clientId = Math.random().toString(36).substring(2, 10);

/* ══════════════════════════════════════════
   Canvases
══════════════════════════════════════════ */
const glCanvas    = document.getElementById("glCanvas");
const drawCanvas  = document.getElementById("drawCanvas");
const eventCanvas = document.getElementById("eventCanvas");
const dctx        = drawCanvas.getContext("2d");   // للرسم اللحظي فقط

const colorPicker = document.getElementById("colorPicker");
const brushSizeEl = document.getElementById("brushSize");
const zoomInfoEl  = document.getElementById("zoomInfo");
const syncNote    = document.getElementById("syncNotification");

function resizeAll() {
  const W = window.innerWidth;
  const H = window.innerHeight - 96;
  [glCanvas, drawCanvas, eventCanvas].forEach(c => { c.width = W; c.height = H; });
  initWebGL();
  redrawAll();
}
window.addEventListener("resize", resizeAll);

/* ══════════════════════════════════════════
   WebGL setup
══════════════════════════════════════════ */
let gl, prog, posLoc, colorLoc, pointSizeLoc;
let glBatches = []; // { buf, count, r,g,b,a, size, type:'points'|'lines' }

const VS = `
  attribute vec2 a_pos;
  uniform vec2 u_resolution;
  uniform vec2 u_pan;
  uniform float u_zoom;
  uniform float u_pointSize;
  void main() {
    vec2 world = a_pos * u_zoom + u_pan;
    vec2 clip  = (world / u_resolution) * 2.0 - 1.0;
    gl_Position  = vec4(clip.x, -clip.y, 0, 1);
    gl_PointSize = u_pointSize;
  }
`;
const FS = `
  precision mediump float;
  uniform vec4 u_color;
  void main() { gl_FragColor = u_color; }
`;

function initWebGL() {
  gl = glCanvas.getContext("webgl", { antialias: true, preserveDrawingBuffer: true });
  if (!gl) return;
  gl.viewport(0, 0, glCanvas.width, glCanvas.height);
  gl.clearColor(1, 1, 1, 1);
  gl.enable(gl.BLEND);
  gl.blendFunc(gl.SRC_ALPHA, gl.ONE_MINUS_SRC_ALPHA);

  const vs = gl.createShader(gl.VERTEX_SHADER);
  gl.shaderSource(vs, VS); gl.compileShader(vs);
  const fs = gl.createShader(gl.FRAGMENT_SHADER);
  gl.shaderSource(fs, FS); gl.compileShader(fs);

  prog = gl.createProgram();
  gl.attachShader(prog, vs); gl.attachShader(prog, fs);
  gl.linkProgram(prog); gl.useProgram(prog);

  posLoc       = gl.getAttribLocation(prog,  "a_pos");
  colorLoc     = gl.getUniformLocation(prog, "u_color");
  pointSizeLoc = gl.getUniformLocation(prog, "u_pointSize");

  gl.uniform2f(gl.getUniformLocation(prog, "u_resolution"), glCanvas.width, glCanvas.height);
}

function glSetTransform() {
  gl.uniform2f(gl.getUniformLocation(prog, "u_pan"),  panX, panY);
  gl.uniform1f(gl.getUniformLocation(prog, "u_zoom"), zoom);
  gl.uniform2f(gl.getUniformLocation(prog, "u_resolution"), glCanvas.width, glCanvas.height);
}

/* يحوّل path لـ WebGL buffer ويضيفه لـ glBatches */
function pathToGL(path) {
  if (!path.points || path.points.length < 2) return;
  const col   = hexToRgb(path.color);
  const size  = path.size;

  if (path.tool === "pencil") {
    // الأشكال مخزنة في path.grains
    if (!path.grains) generateGrains(path);
    const grains = path.grains;
    const verts  = new Float32Array(grains.length * 2);
    const sizes  = [];
    const alphas = [];
    for (let i = 0; i < grains.length; i++) {
      verts[i*2]   = grains[i].x;
      verts[i*2+1] = grains[i].y;
      sizes.push(grains[i].rad * 2);
      alphas.push(grains[i].a);
    }
    // كل grain بـ alpha وsize مختلف — نرسمهم في groups
    // لتبسيط: نرسم كل grain كـ gl.POINTS call منفصل في batch
    // أسرع: نرسم chunks بنفس الـ alpha تقريباً
    const buf = gl.createBuffer();
    gl.bindBuffer(gl.ARRAY_BUFFER, buf);
    gl.bufferData(gl.ARRAY_BUFFER, verts, gl.STATIC_DRAW);
    glBatches.push({ buf, count: grains.length, r: col.r, g: col.g, b: col.b,
                     alphas, sizes, type: "pencil_points" });
  } else {
    // Brush — line strip
    const verts = new Float32Array(path.points.length * 2);
    for (let i = 0; i < path.points.length; i++) {
      verts[i*2]   = path.points[i].x;
      verts[i*2+1] = path.points[i].y;
    }
    const buf = gl.createBuffer();
    gl.bindBuffer(gl.ARRAY_BUFFER, buf);
    gl.bufferData(gl.ARRAY_BUFFER, verts, gl.STATIC_DRAW);
    glBatches.push({ buf, count: path.points.length, r: col.r, g: col.g, b: col.b,
                     a: 1.0, lineWidth: size, type: "brush" });
  }
}

function redrawAll() {
  if (!gl) return;
  glSetTransform();
  gl.clear(gl.COLOR_BUFFER_BIT);

  for (const batch of glBatches) {
    gl.bindBuffer(gl.ARRAY_BUFFER, batch.buf);
    gl.enableVertexAttribArray(posLoc);
    gl.vertexAttribPointer(posLoc, 2, gl.FLOAT, false, 0, 0);

    if (batch.type === "pencil_points") {
      // رسم النقط بـ gl.POINTS — كل نقطة بـ alpha وsize خاص
      // نجمع النقط بنفس التقريب لتقليل draw calls
      const grains = batch.alphas;
      for (let i = 0; i < batch.count; i++) {
        gl.uniform4f(colorLoc, batch.r, batch.g, batch.b, batch.alphas[i]);
        gl.uniform1f(pointSizeLoc, Math.max(1, batch.sizes[i] * zoom));
        gl.drawArrays(gl.POINTS, i, 1);
      }
    } else {
      // Brush — نستخدم 2D canvas لأن WebGL مش بيدعم lineWidth > 1 بشكل محترم
      gl.uniform4f(colorLoc, batch.r, batch.g, batch.b, batch.a);
      gl.uniform1f(pointSizeLoc, 1);
      gl.drawArrays(gl.LINE_STRIP, 0, batch.count);
    }
  }
  updateZoomInfo();
}

/* ══════════════════════════════════════════
   Pencil grains generation (مرة واحدة بس)
══════════════════════════════════════════ */
function generateGrains(path) {
  path.grains = [];
  const pts     = path.points;
  const size    = path.size;
  const spread  = size * 0.7;
  const baseRad = 0.12 + size * 0.04;
  for (let i = 1; i < pts.length; i++) {
    const dx  = pts[i].x - pts[i-1].x;
    const dy  = pts[i].y - pts[i-1].y;
    const len = Math.sqrt(dx*dx + dy*dy);
    if (len === 0) continue;
    const count = Math.max(4, Math.floor(len / 0.8) * size * 0.5);
    for (let j = 0; j < count; j++) {
      const t  = Math.random();
      const ox = (Math.random() - 0.5) * 2 * spread;
      const oy = (Math.random() - 0.5) * 2 * spread;
      path.grains.push({
        x:   pts[i-1].x + dx * t + ox,
        y:   pts[i-1].y + dy * t + oy,
        rad: baseRad * (0.4 + Math.random() * 0.9),
        a:   0.25 + Math.random() * 0.55
      });
    }
  }
}

/* ══════════════════════════════════════════
   2D Canvas — رسم لحظي (أثناء السحب فقط)
══════════════════════════════════════════ */
function clearLiveCanvas() {
  dctx.clearRect(0, 0, drawCanvas.width, drawCanvas.height);
}

function drawLiveSegment(x1, y1, x2, y2) {
  dctx.setTransform(zoom, 0, 0, zoom, panX, panY);
  if (currentTool === "pencil") {
    const col     = colorPicker.value;
    const size    = parseFloat(brushSizeEl.value);
    const spread  = size * 0.7;
    const baseRad = 0.12 + size * 0.04;
    const dx      = x2 - x1, dy = y2 - y1;
    const len     = Math.sqrt(dx*dx + dy*dy);
    const count   = Math.max(4, Math.floor(len / 0.8) * size * 0.5);
    const rgb     = hexToRgb(col);
    for (let j = 0; j < count; j++) {
      const t   = Math.random();
      const ox  = (Math.random() - 0.5) * 2 * spread;
      const oy  = (Math.random() - 0.5) * 2 * spread;
      const rad = baseRad * (0.4 + Math.random() * 0.9);
      const a   = 0.25 + Math.random() * 0.55;
      dctx.beginPath();
      dctx.arc(x1 + dx*t + ox, y1 + dy*t + oy, rad, 0, Math.PI*2);
      dctx.fillStyle = `rgba(${Math.round(rgb.r*255)},${Math.round(rgb.g*255)},${Math.round(rgb.b*255)},${a.toFixed(2)})`;
      dctx.fill();
    }
  } else {
    const size = parseFloat(brushSizeEl.value);
    const col  = colorPicker.value;
    dctx.strokeStyle = col;
    dctx.lineWidth   = size;
    dctx.lineCap     = "round";
    dctx.lineJoin    = "round";
    dctx.beginPath();
    dctx.moveTo(x1, y1);
    dctx.lineTo(x2, y2);
    dctx.stroke();
  }
}

/* ══════════════════════════════════════════
   State
══════════════════════════════════════════ */
let paths = [], undonePaths = [], currentPath = null;
let drawing = false;
let zoom = 1, panX = 0, panY = 0;
let isZooming = false, lastTouchDist = 0;
let currentRoom = null, currentPathId = null;
let currentTool = "brush";

function hexToRgb(hex) {
  return {
    r: parseInt(hex.slice(1,3),16)/255,
    g: parseInt(hex.slice(3,5),16)/255,
    b: parseInt(hex.slice(5,7),16)/255
  };
}

function notify(msg, ms = 2000) {
  syncNote.textContent = msg;
  syncNote.classList.add("show");
  setTimeout(() => syncNote.classList.remove("show"), ms);
}

function updateZoomInfo() {
  zoomInfoEl.textContent = `زوم: ${zoom.toFixed(2)}x`;
}

function toWorld(sx, sy) {
  const r = eventCanvas.getBoundingClientRect();
  return { x: (sx - r.left - panX) / zoom, y: (sy - r.top - panY) / zoom };
}

/* ══════════════════════════════════════════
   Zoom
══════════════════════════════════════════ */
function applyZoom(nz, px, py) {
  nz = Math.max(0.0000000000000000000000001, Math.min(nz, 100));
  const r  = eventCanvas.getBoundingClientRect();
  const wx = (px - r.left - panX) / zoom;
  const wy = (py - r.top  - panY) / zoom;
  zoom = nz;
  panX = px - r.left - wx * zoom;
  panY = py - r.top  - wy * zoom;
  redrawAll();
}

/* ══════════════════════════════════════════
   Drawing
══════════════════════════════════════════ */
function startDrawing(sx, sy) {
  drawing = true;
  const pos = toWorld(sx, sy);
  currentPath = {
    color: colorPicker.value,
    size:  parseFloat(brushSizeEl.value),
    tool:  currentTool,
    points:[pos],
    t:     Date.now()
  };
  if (currentRoom) {
    const ref = db.ref(`rooms/${currentRoom}/paths`).push();
    currentPathId = ref.key;
    ref.set({ color: currentPath.color, size: currentPath.size,
               tool: currentPath.tool, points: currentPath.points });
  }
}

function continueDrawing(sx, sy) {
  if (!drawing) return;
  const pos  = toWorld(sx, sy);
  const last = currentPath.points[currentPath.points.length - 1];
  currentPath.points.push(pos);
  drawLiveSegment(last.x, last.y, pos.x, pos.y);
  if (currentRoom && currentPathId)
    db.ref(`rooms/${currentRoom}/paths/${currentPathId}/points`).set(currentPath.points);
}

function stopDrawing() {
  if (drawing && currentPath && currentPath.points.length > 1) {
    if (currentPath.tool === "pencil") generateGrains(currentPath);
    paths.push(currentPath);
    undonePaths = [];
    pathToGL(currentPath);   // رفع لـ WebGL buffer
    clearLiveCanvas();
    redrawAll();
  }
  drawing = false; currentPath = null;
}

/* ══════════════════════════════════════════
   Events
══════════════════════════════════════════ */
eventCanvas.addEventListener("mousedown", e => startDrawing(e.clientX, e.clientY));
window.addEventListener("mousemove",      e => { if (drawing) continueDrawing(e.clientX, e.clientY); });
window.addEventListener("mouseup",        stopDrawing);

eventCanvas.addEventListener("touchstart", e => {
  e.preventDefault();
  if (e.touches.length === 2) {
    stopDrawing(); isZooming = true;
    const cutoff = Date.now() - 400;
    paths = paths.filter(p => !p.t || p.t < cutoff);
    rebuildGL();
    const t0 = e.touches[0], t1 = e.touches[1];
    lastTouchDist = Math.hypot(t1.clientX-t0.clientX, t1.clientY-t0.clientY);
  } else if (e.touches.length === 1 && !isZooming) {
    startDrawing(e.touches[0].clientX, e.touches[0].clientY);
  }
}, { passive: false });

eventCanvas.addEventListener("touchmove", e => {
  e.preventDefault();
  if (isZooming && e.touches.length === 2) {
    const t0 = e.touches[0], t1 = e.touches[1];
    const nd   = Math.hypot(t1.clientX-t0.clientX, t1.clientY-t0.clientY);
    const midX = (t0.clientX+t1.clientX)/2, midY = (t0.clientY+t1.clientY)/2;
    applyZoom(zoom*(nd/lastTouchDist), midX, midY);
    lastTouchDist = nd;
  } else if (!isZooming && e.touches.length === 1) {
    continueDrawing(e.touches[0].clientX, e.touches[0].clientY);
  }
}, { passive: false });

eventCanvas.addEventListener("touchend", e => {
  if (e.touches.length < 2) isZooming = false;
  if (e.touches.length === 0) stopDrawing();
});

/* ══════════════════════════════════════════
   Rebuild GL from paths array
══════════════════════════════════════════ */
function rebuildGL() {
  // حذف buffers القديمة
  for (const b of glBatches) gl.deleteBuffer(b.buf);
  glBatches = [];
  for (const p of paths) pathToGL(p);
  clearLiveCanvas();
  redrawAll();
}

/* ══════════════════════════════════════════
   Quick colours
══════════════════════════════════════════ */
const QUICK_COLORS = [
  "#000000","#ffffff","#ef4444","#f97316","#eab308",
  "#22c55e","#3b82f6","#8b5cf6","#ec4899","#6b7280","#78350f","#0ea5e9"
];
const qcContainer = document.getElementById("quickColors");
QUICK_COLORS.forEach(c => {
  const btn = document.createElement("button");
  btn.className = "qcolor"; btn.style.background = c; btn.title = c;
  if (c === colorPicker.value) btn.classList.add("selected");
  btn.onclick = () => {
    colorPicker.value = c;
    document.querySelectorAll(".qcolor").forEach(b => b.classList.remove("selected"));
    btn.classList.add("selected");
  };
  qcContainer.appendChild(btn);
});
colorPicker.addEventListener("input", () =>
  document.querySelectorAll(".qcolor").forEach(b => b.classList.remove("selected")));

/* ══════════════════════════════════════════
   Tool selection
══════════════════════════════════════════ */
function setTool(tool) {
  currentTool = tool;
  document.querySelectorAll(".draw-tool-btn").forEach(b =>
    b.classList.toggle("active", b.dataset.tool === tool));
}
document.querySelectorAll(".draw-tool-btn").forEach(b =>
  b.onclick = () => setTool(b.dataset.tool));

/* ══════════════════════════════════════════
   Menus
══════════════════════════════════════════ */
const toolsMenu    = document.getElementById("toolsMenu");
const dropdownMenu = document.getElementById("dropdownMenu");

document.getElementById("paletteBtn").onclick = e => {
  e.stopPropagation();
  toolsMenu.style.display = toolsMenu.style.display === "flex" ? "none" : "flex";
  dropdownMenu.style.display = "none";
};
document.getElementById("menuToggle").onclick = e => {
  e.stopPropagation();
  dropdownMenu.style.display = dropdownMenu.style.display === "flex" ? "none" : "flex";
  toolsMenu.style.display = "none";
};
document.addEventListener("click", () => {
  toolsMenu.style.display = dropdownMenu.style.display = "none";
});
[toolsMenu, dropdownMenu].forEach(m => m.addEventListener("click", e => e.stopPropagation()));

/* ══════════════════════════════════════════
   Buttons
══════════════════════════════════════════ */
document.getElementById("clearBtn").onclick = () => {
  if (currentRoom) db.ref(`rooms/${currentRoom}/paths`).remove();
  paths = []; undonePaths = []; rebuildGL();
};
document.getElementById("undoBtn").onclick = () => {
  if (!paths.length) return;
  undonePaths.push(paths.pop());
  if (currentRoom) db.ref(`rooms/${currentRoom}/paths`).set(paths.length ? paths : null);
  rebuildGL();
};
document.getElementById("redoBtn").onclick = () => {
  if (!undonePaths.length) return;
  paths.push(undonePaths.pop());
  if (currentRoom) db.ref(`rooms/${currentRoom}/paths`).set(paths);
  rebuildGL();
};
document.getElementById("saveBtn").onclick = () => {
  // دمج الطبقتين في صورة واحدة
  const tmp = document.createElement("canvas");
  tmp.width = glCanvas.width; tmp.height = glCanvas.height;
  const tc = tmp.getContext("2d");
  tc.fillStyle = "white"; tc.fillRect(0,0,tmp.width,tmp.height);
  tc.drawImage(glCanvas, 0, 0);
  tc.drawImage(drawCanvas, 0, 0);
  const a = document.createElement("a");
  a.download = "drawing.png"; a.href = tmp.toDataURL(); a.click();
};
document.getElementById("saveJsonBtn").onclick = () => {
  const blob = new Blob([JSON.stringify({paths,zoom,panX,panY})], {type:"application/json"});
  const a = document.createElement("a"); a.download = "drawing.json";
  a.href = URL.createObjectURL(blob); a.click();
};
document.getElementById("loadJsonBtn").onclick = () =>
  document.getElementById("jsonFileInput").click();
document.getElementById("jsonFileInput").addEventListener("change", e => {
  const file = e.target.files[0]; if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    try {
      const d = JSON.parse(ev.target.result);
      paths = d.paths||[]; zoom = d.zoom||1; panX = d.panX||0; panY = d.panY||0;
      undonePaths = []; rebuildGL();
    } catch { alert("خطأ في الملف"); }
  };
  reader.readAsText(file); e.target.value = "";
});

/* ══════════════════════════════════════════
   Rooms
══════════════════════════════════════════ */
document.getElementById("newRoomBtn").onclick = () => {
  const code = Math.random().toString(36).substring(2,7).toUpperCase();
  document.getElementById("roomCodeInput").value = code;
  joinRoom(code);
};
document.getElementById("joinRoomBtn").onclick = () => {
  const code = document.getElementById("roomCodeInput").value.trim().toUpperCase();
  if (code) joinRoom(code); else alert("أدخل كود الغرفة");
};
document.getElementById("leaveRoomBtn").onclick = () => {
  if (currentRoom) { db.ref(`rooms/${currentRoom}/paths`).off(); currentRoom = null; }
  document.getElementById("connectionStatus").classList.remove("status-connected");
  document.getElementById("newRoomBtn").style.display   = "";
  document.getElementById("joinRoomBtn").style.display  = "";
  document.getElementById("leaveRoomBtn").style.display = "none";
  notify("غادرت الغرفة");
};
function joinRoom(code) {
  if (currentRoom) db.ref(`rooms/${currentRoom}/paths`).off();
  currentRoom = code; paths = [];
  document.getElementById("connectionStatus").classList.add("status-connected");
  document.getElementById("newRoomBtn").style.display   = "none";
  document.getElementById("joinRoomBtn").style.display  = "none";
  document.getElementById("leaveRoomBtn").style.display = "";
  db.ref(`rooms/${currentRoom}/paths`).on("value", snap => {
    const data = snap.val();
    paths = data ? Object.values(data) : [];
    rebuildGL();
  });
  notify("انضممت للغرفة: " + code);
}

/* ══════════════════════════════════════════
   Init
══════════════════════════════════════════ */
resizeAll();
</script>
</body>
</html>
